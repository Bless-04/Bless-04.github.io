name: Three.js Page Deploy
#yaml auto formatting is gross; it wont work if i mak
on:
        push:
                branches: [main]

jobs:
        publish:
                permissions:
                        contents: write
                runs-on: ubuntu-latest
                steps:
                        - uses: actions/checkout@v4
                        - name: Deploy Portfolio
                          uses: rayluo/github-pages-overwriter@v1.3

                          with:
                                  source-directory: ./dist # where the source three.js generates files are
                                  target-branch: gh-pages # branch that deploys it
